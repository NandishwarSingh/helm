name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

# Build the image in CI (never on the RAM-tight VPS), push to GHCR, then pull +
# restart on the box over SSH.
permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/nandishwarsingh/helm

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE }}:latest
          build-args: |
            NEXT_PUBLIC_SITE_URL=https://helm.houndcode.com
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Pull + restart on the VPS
        uses: appleboy/ssh-action@v1.2.0
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER: ${{ github.actor }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: GHCR_TOKEN,GHCR_USER
          script: |
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
            cd /opt/helm
            docker compose pull
            docker compose up -d
            docker image prune -f
            sleep 5
            curl -fsS -o /dev/null -w "helm local health: %{http_code}\n" http://127.0.0.1:3002 || echo "app not up yet"
